services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: opositaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opositaria
      POSTGRES_USER: opositaria
      POSTGRES_PASSWORD: opositaria_dev
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opositaria -d opositaria"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: opositaria-rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: opositaria
      RABBITMQ_DEFAULT_PASS: opositaria_dev
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
  rabbitmq_data: