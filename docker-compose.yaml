services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: opositaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opositaria
      POSTGRES_USER: opositaria
      POSTGRES_PASSWORD: opositaria_dev
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opositaria -d opositaria"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: opositaria-rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: opositaria
      RABBITMQ_DEFAULT_PASS: opositaria_dev
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    container_name: opositaria-migrate
    profiles: ["migrate"]
    restart: "no"
    environment:
      DATABASE_ASYNC_URL: postgresql+asyncpg://opositaria:opositaria_dev@postgres:5432/opositaria
      RABBITMQ_URL: amqp://opositaria:opositaria_dev@rabbitmq:5672/
      DOCUMENT_STORAGE_PATH: /app/data/documents
      JWT_SECRET_KEY: change-me-in-production-use-a-long-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]

  api:
    build: .
    container_name: opositaria-api
    profiles: ["api"]
    restart: unless-stopped
    environment:
      DATABASE_ASYNC_URL: postgresql+asyncpg://opositaria:opositaria_dev@postgres:5432/opositaria
      RABBITMQ_URL: amqp://opositaria:opositaria_dev@rabbitmq:5672/
      DOCUMENT_STORAGE_PATH: /app/data/documents
      JWT_SECRET_KEY: change-me-in-production-use-a-long-secret-key
    ports:
      - "8000:8000"
    volumes:
      - ./data/documents:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command:
      [
        "uv",
        "run",
        "--no-sync",
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

  worker:
    build: .
    container_name: opositaria-worker
    restart: unless-stopped
    environment:
      DATABASE_ASYNC_URL: postgresql+asyncpg://opositaria:opositaria_dev@postgres:5432/opositaria
      RABBITMQ_URL: amqp://opositaria:opositaria_dev@rabbitmq:5672/
      DOCUMENT_STORAGE_PATH: /app/data/documents
      JWT_SECRET_KEY: change-me-in-production-use-a-long-secret-key
    volumes:
      - ./data/documents:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command:
      [
        "uv",
        "run",
        "--no-sync",
        "python",
        "-m",
        "src.document_processing.infrastructure.worker_entrypoint",
      ]

volumes:
  pgvector_data:
  rabbitmq_data:
